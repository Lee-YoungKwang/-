
html = r"""<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>파동 비교 캡처 & 계이름 맞추기 게임</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        #start-screen { z-index: 10; text-align: center; }
        .btn-primary { background: #00ffcc; color: #111; border: none; padding: 20px 40px; font-size: 1.5rem; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px rgba(0, 255, 204, 0.4); transition: transform 0.2s; }
        .btn-primary:active { transform: scale(0.95); }

        #app-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
        canvas { display: block; width: 100%; height: 100%; }

        #hud { position: absolute; top: 20px; left: 20px; z-index: 5; background: rgba(0, 0, 0, 0.7); padding: 15px 25px; border-radius: 12px; border: 1px solid #333; transition: all 0.3s ease; }
        .stat { font-size: 1.2rem; margin-bottom: 10px; color: #aaa; display: flex; align-items: center; justify-content: space-between;}
        .value { font-size: 1.8rem; font-weight: bold; color: #00ffcc; display: inline-block; min-width: 80px; text-align: right; }
        
        /* 피크 홀드 표시용 작은 마크 */
        #peak-hold { font-size: 0.9rem; color: #ff69b4; margin-left: 6px; }
        
        input[type="range"] { margin: 0 10px; width: 80px; accent-color: #ffb703; }

        #game-ui { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #555; text-align: center; }
        #target-note { font-size: 2.5rem; font-weight: bold; color: #ffb703; }
        #target-hz-hint { font-size: 1rem; color: #888; margin-top: 5px; }
        #game-msg { font-size: 1.2rem; font-weight: bold; color: #ffb703; margin-top: 5px; height: 24px; transition: color 0.2s; }
        .success-border { border-color: #00ffcc !important; box-shadow: 0 0 30px rgba(0, 255, 204, 0.5); }
        #note-badge { display:inline-block; background:#222; color:#ffb703; padding:2px 8px; border-radius:6px; font-size:0.9rem; margin-left:6px; }

        #controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 5; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 30px; width: 90%; max-width: 600px; }
        .action-btn { background: #333; color: #fff; border: 1px solid #555; padding: 10px 20px; font-size: 1.1rem; border-radius: 30px; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .action-btn:hover { background: #4facfe; border-color: #4facfe; }
        .action-btn:active { transform: scale(0.9); }
        .btn-active { background: #ffb703; color: #111; border-color: #ffb703; }
        .btn-mode { background: #4facfe; color: #111; font-weight: bold; border-color: #4facfe; }
        
        #btn-cap1 { border-color: #ffb703; color: #ffb703; }
        #btn-cap2 { border-color: #ff69b4; color: #ff69b4; }
    </style>
</head>
<body>

    <div id="start-screen">
        <button id="startButton" class="btn-primary">🎙️ 마이크 켜기</button>
        <p style="color:#aaa; margin-top:20px;">버튼을 누르고 마이크 권한을 허용해주세요.</p>
    </div>

    <div id="app-container">
        <div id="hud">
            <div class="stat">
                소리 크기(진폭): 
                <span>
                    <span class="value" id="vol-val">0</span>
                    <span style="font-size:1rem; margin-left:5px;">%</span>
                    <span id="peak-hold">▲0</span>
                </span>
            </div>
            <div class="stat">
                소리 높낮이(Hz): 
                <span>
                    <span class="value" id="freq-val">0</span> 
                    <span style="font-size:1rem; margin-left:5px;">Hz</span>
                    <span id="note-badge">—</span>
                </span>
            </div>
            <div class="stat" style="font-size: 1rem; margin-top: 15px; border-top: 1px solid #444; padding-top: 10px;">
                노이즈 필터: 
                <input type="range" id="noise-gate" min="2" max="40" value="8"> 
                <span class="value" id="gate-val" style="min-width: 40px; font-size:1.2rem; color:#ffb703;">8</span> %
            </div>
            
            <div id="game-ui">
                <div style="font-size: 1rem; color: #ccc;">목표 계이름을 맞춰보세요!</div>
                <div id="target-note">도 (C4)</div>
                <div id="target-hz-hint">목표 주파수: 262 Hz</div>
                <div id="game-msg"></div>
            </div>
        </div>

        <div id="controls">
            <button class="action-btn btn-mode" id="btn-mode">🌊 교과서 파형</button>
            <button class="action-btn" id="btn-cap1">📸 캡처 1 (노랑)</button>
            <button class="action-btn" id="btn-cap2">📸 캡처 2 (분홍)</button>
            <button class="action-btn" id="btn-clear" style="display:none;">🗑️ 모두 지우기</button>
            <button class="action-btn" id="btn-game">🎮 계이름 게임</button>
        </div>

        <canvas id="waveCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        const hud = document.getElementById('hud');
        let audioCtx, analyser, timeData, freqData, bufferLength;
        let width, height;

        let capturedPath1 = null, capturedPath2 = null;
        let capturedFreq1 = null, capturedFreq2 = null;
        
        let isGameMode = false;
        let isIdealMode = true;
        let currentTarget = null;
        let matchTimer = null;
        let matchFrames = 0; 
        const REQUIRED_FRAMES = 15; 

        const notes = [
            { name: '도', hz: 262 }, { name: '레', hz: 294 },
            { name: '미', hz: 330 }, { name: '파', hz: 349 },
            { name: '솔', hz: 392 }, { name: '라', hz: 440 },
            { name: '시', hz: 494 }, { name: '높은 도', hz: 523 }
        ];

        let smoothVol = 0, smoothFreq = 0, phase = 0;
        let peakHold = 0;       // 피크 홀드 값
        let peakHoldTime = 0;   // 피크가 갱신된 시각

        const uiVol = document.getElementById('vol-val');
        const uiFreq = document.getElementById('freq-val');
        const uiPeakHold = document.getElementById('peak-hold');
        const uiNoteBadge = document.getElementById('note-badge');
        const uiNoiseGate = document.getElementById('noise-gate');
        const uiGateVal = document.getElementById('gate-val');
        const uiGame = document.getElementById('game-ui');
        const uiTargetNote = document.getElementById('target-note');
        const uiTargetHzHint = document.getElementById('target-hz-hint');
        const uiGameMsg = document.getElementById('game-msg');
        
        const btnMode = document.getElementById('btn-mode');
        const btnCap1 = document.getElementById('btn-cap1');
        const btnCap2 = document.getElementById('btn-cap2');
        const btnClear = document.getElementById('btn-clear');
        const btnGame = document.getElementById('btn-game');

        let noiseThreshold = parseInt(uiNoiseGate.value);
        uiNoiseGate.addEventListener('input', (e) => {
            noiseThreshold = parseInt(e.target.value);
            uiGateVal.innerText = noiseThreshold;
        });

        function resize() {
            width = canvas.width = window.innerWidth * window.devicePixelRatio;
            height = canvas.height = window.innerHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            width = window.innerWidth; height = window.innerHeight;
        }
        window.addEventListener('resize', resize);

        async function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            try {
                let stream;
                // [개선 A] AGC/노이즈억제/에코를 'exact:false'로 강하게 끄도록 시도
                // 일부 기기는 ideal:false를 무시하기 때문에 exact 제약으로 강제합니다.
                const strictConstraints = {
                    audio: {
                        autoGainControl:   { exact: false },
                        noiseSuppression:  { exact: false },
                        echoCancellation:  { exact: false }
                    }
                };
                const fallbackConstraints = {
                    audio: {
                        autoGainControl: false,
                        noiseSuppression: false,
                        echoCancellation: false
                    }
                };
                try {
                    stream = await navigator.mediaDevices.getUserMedia(strictConstraints);
                } catch (e1) {
                    try {
                        stream = await navigator.mediaDevices.getUserMedia(fallbackConstraints);
                    } catch (e2) {
                        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    }
                }
                
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 4096;
                analyser.smoothingTimeConstant = 0.0; // 분석값 자체는 평활하지 않음 (우리가 직접 제어)
                audioCtx.createMediaStreamSource(stream).connect(analyser);
                
                bufferLength = analyser.fftSize;
                timeData = new Float32Array(bufferLength);
                freqData = new Float32Array(analyser.frequencyBinCount);
                
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                resize(); draw();
            } catch (err) { 
                alert("마이크를 켤 수 없습니다. 브라우저 설정에서 마이크 권한을 허용해주세요!\n\n오류 내용: " + err.message); 
            }
        }

        // ===== 자기상관 기반 피치 검출 =====
        function autoCorrelate(buf, sampleRate) {
            const SIZE = buf.length;
            let rms = 0;
            for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
            rms = Math.sqrt(rms / SIZE);
            if (rms < 0.005) return -1;

            let r1 = 0, r2 = SIZE - 1, thres = 0.2;
            for (let i = 0; i < SIZE / 2; i++) if (Math.abs(buf[i]) < thres) { r1 = i; break; }
            for (let i = 1; i < SIZE / 2; i++) if (Math.abs(buf[SIZE - i]) < thres) { r2 = SIZE - i; break; }
            const trimmed = buf.slice(r1, r2);
            const newSize = trimmed.length;

            const c = new Array(newSize).fill(0);
            for (let i = 0; i < newSize; i++) {
                for (let j = 0; j < newSize - i; j++) c[i] += trimmed[j] * trimmed[j + i];
            }
            let d = 0; while (d < newSize - 1 && c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < newSize; i++) {
                if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
            }
            if (maxpos <= 0) return -1;
            let T0 = maxpos;
            const x1 = c[T0 - 1] || 0, x2 = c[T0], x3 = c[T0 + 1] || 0;
            const a = (x1 + x3 - 2 * x2) / 2, b = (x3 - x1) / 2;
            if (a) T0 = T0 - b / (2 * a);
            return sampleRate / T0;
        }

        function hzToNoteName(hz) {
            if (!hz || hz <= 0) return "—";
            let best = notes[0], bestCents = 1e9;
            for (const n of notes) {
                const cents = Math.abs(1200 * Math.log2(hz / n.hz));
                if (cents < bestCents) { bestCents = cents; best = n; }
            }
            return bestCents < 100 ? best.name : "—";
        }

        function setNewTarget() {
            const randomIndex = Math.floor(Math.random() * notes.length);
            currentTarget = notes[randomIndex];
            matchFrames = 0;
            uiTargetNote.innerText = currentTarget.name;
            uiTargetHzHint.innerText = "(목표 주파수: " + currentTarget.hz + " Hz)";
            hud.classList.remove('success-border');
            uiGameMsg.innerText = "소리를 내보세요!";
            uiGameMsg.style.color = "#ffb703";
        }

        function drawGrid() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.07)';
            ctx.lineWidth = 1; ctx.beginPath();
            for(let i = 0; i < height; i += 40) { ctx.moveTo(0, i); ctx.lineTo(width, i); }
            for(let i = 0; i < width; i += 40) { ctx.moveTo(i, 0); ctx.lineTo(i, height); }
            ctx.stroke();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 2; ctx.beginPath();
            ctx.moveTo(0, height / 2); ctx.lineTo(width, height / 2); ctx.stroke();
        }

        function drawPath(pathArray, color, lineWidth) {
            if (pathArray.length === 0) return;
            ctx.lineWidth = lineWidth;
            ctx.strokeStyle = color;
            ctx.beginPath();
            for (let i = 0; i < pathArray.length; i++) {
                if (i === 0) ctx.moveTo(pathArray[i].x, pathArray[i].y);
                else ctx.lineTo(pathArray[i].x, pathArray[i].y);
            }
            ctx.stroke();
        }

        function draw() {
            requestAnimationFrame(draw);
            analyser.getFloatTimeDomainData(timeData);

            // ===== [핵심 개선] RMS + 피크(Peak)를 함께 측정 =====
            let sumSquares = 0;
            let peakSample = 0;
            for (let i = 0; i < bufferLength; i++) {
                const v = timeData[i];
                sumSquares += v * v;
                const absV = v < 0 ? -v : v;
                if (absV > peakSample) peakSample = absV;
            }
            const rms = Math.sqrt(sumSquares / bufferLength);

            // [개선 B] 피크 dBFS 사용 — 화면 파형 높이와 직결되는 값
            const peakDb = 20 * Math.log10(peakSample + 1e-10);

            // [개선 C] dB 매핑 범위를 -75dB ~ -3dB로 확장 (이전: -60 ~ 0)
            //  → "엄청 큰 소리"가 들어올 자리(상단)에 여유 공간 확보
            //  → 작은 소리(말소리 -20dB대)는 약 55% 부근에서 시작
            const MIN_DB = -75;
            const MAX_DB = -3;
            let frac = (peakDb - MIN_DB) / (MAX_DB - MIN_DB);
            frac = Math.max(0, Math.min(1, frac));

            // [개선 D] 비선형 곡선: 작은 소리 영역은 살짝 빠르게, 큰 소리는 천천히 100%로
            //  exponent 0.8 → 중간~큰 소리에서 변화 폭이 잘 보이도록 분산
            const rawVol = Math.pow(frac, 0.8) * 100;

            // ===== 피치 검출 (자기상관) =====
            let detectedHz = -1;
            if (rms > 0.005) detectedHz = autoCorrelate(timeData, audioCtx.sampleRate);
            const rawFreq = (detectedHz > 30 && detectedHz < 2000) ? detectedHz : smoothFreq;

            // [개선 E] 진폭 평활화: 빠른 상승(어택) + 느린 하강(릴리즈)
            //  → 순간 큰 소리도 시각적으로 즉시 튀어 보이게
            const attack = 0.55;   // 상승 속도 (값이 클수록 빠름)
            const release = 0.15;  // 하강 속도
            const alphaV = rawVol > smoothVol ? attack : release;
            smoothVol += (rawVol - smoothVol) * alphaV;

            smoothFreq += (rawFreq - smoothFreq) * 0.15;

            // [개선 F] 피크 홀드(약 1초간 최고치 유지 후 천천히 하강)
            const now = performance.now();
            if (smoothVol > peakHold) {
                peakHold = smoothVol;
                peakHoldTime = now;
            } else if (now - peakHoldTime > 1000) {
                peakHold = Math.max(smoothVol, peakHold - 0.4);
            }

            uiVol.innerText = Math.round(smoothVol);
            uiPeakHold.innerText = "▲" + Math.round(peakHold);
            uiFreq.innerText = smoothVol > noiseThreshold ? Math.round(smoothFreq) : 0;
            uiNoteBadge.innerText = smoothVol > noiseThreshold ? hzToNoteName(smoothFreq) : "—";

            if (smoothVol > noiseThreshold) phase += 0.04; 

            // ===== 게임 로직 (센트 단위로 판정) =====
            if (isGameMode && !matchTimer) {
                if (smoothVol > noiseThreshold && smoothFreq > 30) {
                    const cents = Math.abs(1200 * Math.log2(smoothFreq / currentTarget.hz));
                    if (cents <= 50) {
                        matchFrames++;
                        if (matchFrames >= REQUIRED_FRAMES) {
                            uiGameMsg.innerText = "🎉 정답! 훌륭합니다!";
                            uiGameMsg.style.color = "#00ffcc";
                            hud.classList.add('success-border');
                            matchTimer = setTimeout(() => { setNewTarget(); matchTimer = null; }, 2000);
                        } else {
                            const progress = Math.min(Math.floor((matchFrames / REQUIRED_FRAMES) * 100), 99);
                            uiGameMsg.innerText = "유지하세요... " + progress + "%";
                            uiGameMsg.style.color = "#ffb703";
                        }
                    } else {
                        matchFrames = 0;
                        const diff = 1200 * Math.log2(smoothFreq / currentTarget.hz);
                        uiGameMsg.innerText = diff > 0 ? "↓ 조금 낮게" : "↑ 조금 높게";
                        uiGameMsg.style.color = "#ffb703";
                    }
                } else {
                    matchFrames = 0;
                    uiGameMsg.innerText = "소리를 내보세요!";
                    hud.classList.remove('success-border');
                }
            }

            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, width, height);
            drawGrid();

            ctx.font = "bold 20px 'Helvetica Neue', Arial, sans-serif";
            ctx.textAlign = "right"; ctx.textBaseline = "top";

            if (capturedPath1) {
                drawPath(capturedPath1, 'rgba(255, 183, 3, 0.7)', 3);
                ctx.fillStyle = 'rgba(255, 183, 3, 1)';
                ctx.fillText("캡처 1: " + capturedFreq1 + " Hz", width - 20, 20);
            }
            if (capturedPath2) {
                drawPath(capturedPath2, 'rgba(255, 105, 180, 0.7)', 3);
                ctx.fillStyle = 'rgba(255, 105, 180, 1)';
                ctx.fillText("캡처 2: " + capturedFreq2 + " Hz", width - 20, 50);
            }

            let currentPath = [];
            const effectiveVol = (smoothVol > noiseThreshold) ? smoothVol : smoothVol * 0.2;

            if (isIdealMode) {
                // [개선 G] 시각 진폭 곡선을 부드럽게 (exponent 1.0 → 음량 비례 그대로)
                //  이전 1.2는 작은 소리를 너무 짓눌렀음
                const visualMultiplier = effectiveVol / 100;
                const amplitude = visualMultiplier * (height * 0.45);

                // 교과서 파형의 주기 수: Hz / 80 (도262Hz≈3.3주기, 솔392Hz≈4.9주기)
                const cycles = smoothFreq > 0 ? (smoothFreq / 80) : 0;
                const freqMultiplier = (cycles * Math.PI * 2) / width;

                for (let x = 0; x <= width; x += 2) {
                    const y = (height / 2) + Math.sin(x * freqMultiplier - phase) * amplitude;
                    currentPath.push({ x, y });
                }
            } else {
                // [개선 H] 실제 파형도 시각 게인을 적용해 큰 소리/작은 소리 차이가 더 잘 보이게
                //  Float32 데이터를 직접 사용 (-1.0 ~ +1.0)
                const sliceWidth = width / bufferLength;
                const gain = 1.5;  // 시각 증폭
                let x = 0;
                for (let i = 0; i < bufferLength; i++) {
                    let v = timeData[i] * gain;
                    if (rms < 0.005) v *= 0.2;
                    const y = (height / 2) + v * (height / 2);
                    currentPath.push({ x, y });
                    x += sliceWidth;
                }
            }
            
            drawPath(currentPath, '#00ffcc', 4);
            window._tempCurrentPath = currentPath;
        }

        document.getElementById('startButton').addEventListener('click', initAudio);

        btnMode.addEventListener('click', () => {
            isIdealMode = !isIdealMode;
            if (isIdealMode) {
                btnMode.innerText = '🌊 교과서 파형';
                btnMode.style.background = '#4facfe'; btnMode.style.color = '#111';
            } else {
                btnMode.innerText = '🎙️ 실제 복합파';
                btnMode.style.background = '#333'; btnMode.style.color = '#fff';
            }
        });

        function updateClearButtonVisibility() {
            btnClear.style.display = (capturedPath1 || capturedPath2) ? 'block' : 'none';
        }

        btnCap1.addEventListener('click', () => {
            if (window._tempCurrentPath) {
                capturedPath1 = [...window._tempCurrentPath];
                capturedFreq1 = uiFreq.innerText;
                btnCap1.style.display = 'none';
                updateClearButtonVisibility();
            }
        });
        btnCap2.addEventListener('click', () => {
            if (window._tempCurrentPath) {
                capturedPath2 = [...window._tempCurrentPath];
                capturedFreq2 = uiFreq.innerText;
                btnCap2.style.display = 'none';
                updateClearButtonVisibility();
            }
        });
        btnClear.addEventListener('click', () => {
            capturedPath1 = null; capturedPath2 = null;
            capturedFreq1 = null; capturedFreq2 = null;
            btnCap1.style.display = 'block'; btnCap2.style.display = 'block';
            updateClearButtonVisibility();
        });
        btnGame.addEventListener('click', () => {
            isGameMode = !isGameMode;
            if (isGameMode) {
                uiGame.style.display = 'block'; btnGame.innerText = '🎮 게임 끄기';
                btnGame.classList.add('btn-active'); setNewTarget();
            } else {
                uiGame.style.display = 'none'; btnGame.innerText = '🎮 계이름 게임';
                btnGame.classList.remove('btn-active'); hud.classList.remove('success-border');
                if (matchTimer) { clearTimeout(matchTimer); matchTimer = null; }
            }
        });
    </script>
</body>
</html>
"""

with open('/home/user/wave_game_v2.html', 'w', encoding='utf-8') as f:
    f.write(html)
print("파일 크기:", len(html), "bytes")
print("저장 완료")
