<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세계 지각판 및 지진대/화산대 지도 (지우개 도구 포함)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #aadaff; }
        #map { width: 100%; height: 100vh; }
        
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.9); padding: 20px; border-radius: 8px;
            font-size: 16px; font-weight: bold; z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* 좌측 하단 고정 범례 */
        .legend {
            position: absolute; bottom: 30px; left: 30px;
            background: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2); z-index: 1000; font-size: 14px; font-weight: bold;
        }
        .legend-item { display: flex; align-items: center; margin-bottom: 8px; }
        .legend-item:last-child { margin-bottom: 0; }
        .circle { width: 14px; height: 14px; border-radius: 50%; margin-right: 10px; border: 2px solid #fff; box-shadow: 0 0 3px rgba(0,0,0,0.5); }
        .eq-circle { background-color: #f1c40f; } 
        .vol-circle { background-color: #e74c3c; }
        
        .leaflet-control-layers { font-size: 15px; font-weight: bold; padding: 10px; margin-bottom: 30px !important; margin-right: 30px !important; }

        /* 그리기 도구(툴박스) 하단 중앙 배치 */
        .toolbox {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); padding: 10px 15px; border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2); z-index: 1000; 
            display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center;
        }
        .tool-btn {
            padding: 10px 15px; font-size: 15px; font-weight: bold; border: 2px solid #ccc;
            border-radius: 6px; cursor: pointer; background: white; transition: 0.2s;
        }
        .tool-btn:hover { background: #f0f0f0; }
        .tool-btn.active { border-color: #2c3e50; background: #e8f4f8; box-shadow: inset 0 0 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div id="loading">지도를 설정하는 중입니다...</div>
    <div id="map"></div>
    
    <div class="toolbox">
        <button id="btn-move" class="tool-btn active">🖐️ 지도 이동</button>
        <button id="btn-yellow" class="tool-btn">🟡 펜 (노랑)</button>
        <button id="btn-red" class="tool-btn">🔴 펜 (빨강)</button>
        <button id="btn-eraser" class="tool-btn">🧽 부분 지우기</button>
        <button id="btn-clear" class="tool-btn">🗑️ 모두 지우기</button>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="circle eq-circle"></div>지진 (Earthquake)</div>
        <div class="legend-item"><div class="circle vol-circle"></div>화산 (Volcano)</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 지도 초기화 및 영역 고정
        const bounds = [[-85, -35], [85, 335]];
        const map = L.map('map', { 
            maxBounds: bounds, maxBoundsViscosity: 1.0, 
            worldCopyJump: false, zoomSnap: 0 
        });
        map.fitBounds(bounds);

        // 지형 배경 추가
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Physical_Map/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri'
        }).addTo(map);

        // 레이어 그룹 생성
        const boundariesLayer = L.layerGroup(); 
        const earthquakesLayer = L.layerGroup();
        const volcanoesLayer = L.layerGroup();

        // 판 경계선 데이터 렌더링
        fetch('https://cdn.jsdelivr.net/gh/fraxen/tectonicplates@master/GeoJSON/PB2002_boundaries.json')
            .then(res => res.json())
            .then(data => {
                const lineStyle = { color: '#000000', weight: 3.5, opacity: 0.8, interactive: false }; 
                L.geoJSON(data, { style: lineStyle }).addTo(boundariesLayer);
                L.geoJSON(data, {
                    style: lineStyle,
                    coordsToLatLng: coords => new L.LatLng(coords[1], coords[0] + 360)
                }).addTo(boundariesLayer);
                document.getElementById('loading').style.display = 'none';
            });

        // =========================================================================

        // 입력된 데이터 분석 및 중복 제거
        const rows = allData.trim().split('\n');
        const seenCoordinates = new Set();
        
        rows.forEach(row => {
            const parts = row.split(',');
            if(parts.length >= 4) {
                const type = parts[0].trim();
                const lat = parseFloat(parts[1]);
                let lng = parseFloat(parts[2]);
                const uniqueKey = `${type}_${lat}_${lng}`;
                
                if (!seenCoordinates.has(uniqueKey)) {
                    seenCoordinates.add(uniqueKey);
                    if (lng < -30) { lng += 360; } 

                    const isEarthquake = (type === '지진');
                    const fillColor = isEarthquake ? '#f1c40f' : '#e74c3c'; 

                    const marker = L.circleMarker([lat, lng], {
                        radius: 4.5, color: '#ffffff', weight: 1.5,
                        fillColor: fillColor, fillOpacity: 0.9,
                        interactive: false 
                    });

                    if (isEarthquake) marker.addTo(earthquakesLayer);
                    else marker.addTo(volcanoesLayer);
                }
            }
        });

        // 우측 하단 레이어 토글 메뉴
        const overlayMaps = {
            "<span style='color:#000000'>⚫</span> 판의 경계선 (Plate Boundaries)": boundariesLayer,
            "<span style='color:#f1c40f'>🟡</span> 지진대 (Earthquake Zones)": earthquakesLayer,
            "<span style='color:#c0392b'>🔥</span> 화산대 (Volcanic Zones)": volcanoesLayer
        };
        
        L.control.layers(null, overlayMaps, { 
            collapsed: false, 
            position: 'bottomright'
        }).addTo(map);

        // =========================================================================
        // ★ 마우스 그리기 및 지우기 기능 로직
        // =========================================================================
        let drawMode = null; // 'yellow', 'red', 'eraser', null(이동)
        let isDrawing = false;
        let currentLine = null;
        let drawnLines = []; 

        const btnMove = document.getElementById('btn-move');
        const btnYellow = document.getElementById('btn-yellow');
        const btnRed = document.getElementById('btn-red');
        const btnEraser = document.getElementById('btn-eraser'); // 지우개 버튼 추가
        const btnClear = document.getElementById('btn-clear');

        function setDrawMode(mode, activeBtn) {
            drawMode = mode;
            [btnMove, btnYellow, btnRed, btnEraser].forEach(btn => btn.classList.remove('active'));
            activeBtn.classList.add('active'); 

            if (mode === 'yellow' || mode === 'red') { 
                map.dragging.disable(); 
                document.getElementById('map').style.cursor = 'crosshair'; 
            } else if (mode === 'eraser') {
                map.dragging.disable(); 
                document.getElementById('map').style.cursor = 'help'; // 지우개 모드임을 알 수 있는 마우스 커서
            } else { 
                map.dragging.enable(); 
                document.getElementById('map').style.cursor = ''; 
            }
        }

        btnMove.addEventListener('click', () => setDrawMode(null, btnMove));
        btnYellow.addEventListener('click', () => setDrawMode('yellow', btnYellow));
        btnRed.addEventListener('click', () => setDrawMode('red', btnRed));
        btnEraser.addEventListener('click', () => setDrawMode('eraser', btnEraser));
        
        // 모두 지우기
        btnClear.addEventListener('click', () => {
            drawnLines.forEach(line => map.removeLayer(line));
            drawnLines = []; 
        });

        // 마우스를 클릭했을 때 (그리기 시작 혹은 지우기 활성화)
        map.on('mousedown', function(e) {
            if (!drawMode) return;
            isDrawing = true;
            
            // 지우개 모드일 때는 새로운 선을 생성하지 않음
            if (drawMode === 'eraser') return;

            const color = drawMode === 'yellow' ? '#f1c40f' : '#e74c3c';
            
            // 새로운 선 생성 (interactive: true로 두어 지우개가 이 선을 인식할 수 있게 함)
            currentLine = L.polyline([e.latlng], { 
                color: color, weight: 6, opacity: 0.9, lineJoin: 'round', interactive: true 
            }).addTo(map);
            
            // ★ 새로 그린 선에 "부분 지우기" 이벤트를 부여
            currentLine.on('mousedown', function() {
                // 선을 클릭했을 때 지우개 모드라면 삭제
                if (drawMode === 'eraser') {
                    map.removeLayer(this);
                    drawnLines = drawnLines.filter(l => l !== this);
                }
            });
            
            currentLine.on('mouseover', function() {
                // 지우개 모드인 상태로 마우스를 꾹 누르고 선 위를 지나가면 삭제
                if (drawMode === 'eraser' && isDrawing) {
                    map.removeLayer(this);
                    drawnLines = drawnLines.filter(l => l !== this);
                }
            });

            drawnLines.push(currentLine); 
        });

        // 마우스를 드래그할 때
        map.on('mousemove', function(e) {
            if (!isDrawing || !currentLine) return;
            // 펜 모드일 때만 선을 이어줌 (지우개 모드일 땐 무시)
            if (drawMode === 'yellow' || drawMode === 'red') {
                currentLine.addLatLng(e.latlng); 
            }
        });

        // 마우스 클릭을 뗄 때
        map.on('mouseup', function() {
            isDrawing = false;
            currentLine = null;
        });
        
    </script>
